<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #26215c;
            font-family: 'Inter', sans-serif;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .splash-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #26215c;
            position: relative;
        }

        /* Entrance Animation for Logo */
        .animate-entrance {
            animation: logo-fade-in 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes logo-fade-in {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtle Background Atmosphere */
        .bg-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(82, 74, 184, 0.3) 0%, rgba(38, 33, 92, 0) 70%);
            pointer-events: none;
        }

        /* Loading Indicator */
        .loading-bar-container {
            position: absolute;
            bottom: 64px;
            width: 120px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-bar-progress {
            height: 100%;
            background-color: #F2A93B; /* Accent color from logo description */
            width: 0%;
            animation: load-progress 2.5s ease-in-out forwards;
        }

        @keyframes load-progress {
            0% { width: 0%; }
            20% { width: 10%; }
            50% { width: 45%; }
            80% { width: 90%; }
            100% { width: 100%; }
        }

        .footer-brand {
            position: absolute;
            bottom: 32px;
            opacity: 0;
            animation: fade-up 0.8s ease-out 0.5s forwards;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 0.6;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<!-- Main Splash Wrapper -->
<div class="splash-container">
<!-- Subtle Animated Atmosphere Overlay -->
<div class="bg-glow"></div>
<!-- Centered Branding Cluster -->
<div class="flex flex-col items-center justify-center animate-entrance z-10">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-xl overflow-hidden flex items-center justify-center">
<!-- SocietyOS Logo (Image 2) -->
<img alt="SocietyOS Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLsBPmaSGtDt7NGFm2ZYWn8BhA3TuL5duWmNE_JKX47QKdFdtc9sFTkw9as8egpKs37hw1iBypKmo8393EOLalbOERHFUaHkex9ZFFwp2AfSSqdod78m49TSJt7_PD7JRKcJVRwyQkWnLZt-zZf5QYGhaZtKbNF1MqLmEJ7NI2YhLw4Xv17BxmRp5BkNYNVC9sRERazdNmqGOUGPhhmADV2-JVIA9o9ULcoF4FM8k3rIiGGQlRys6j74-7cD"/>
</div>
<!-- Logo Wordmark (Hidden in CSS if logo already contains text, but added here for semantic structure) -->
<h1 class="mt-8 font-display-lg text-display-lg-mobile md:text-display-lg text-white tracking-tight">
                SocietyOS
            </h1>
<p class="mt-2 font-label-md text-label-md text-on-primary-container opacity-80 uppercase tracking-widest">
                Modern Community Living
            </p>
</div>
<!-- Minimalist Loading State -->
<div class="loading-bar-container">
<div class="loading-bar-progress"></div>
</div>
<!-- Legal/Footer Anchor -->
<div class="footer-brand flex flex-col items-center">
<span class="font-label-sm text-label-sm text-white mb-1">Empowering Housing Societies</span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-white">verified</span>
<span class="font-label-sm text-label-sm text-white uppercase tracking-tighter">Powered by SocietyHub</span>
</div>
</div>
</div>

<script>

            // Optional: Simulate a smooth exit transition after the loading bar finishes
            setTimeout(() => {
                const splash = document.querySelector('.splash-container');
