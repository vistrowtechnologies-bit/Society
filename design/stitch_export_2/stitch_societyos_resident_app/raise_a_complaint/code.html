<body class="bg-surface text-on-surface">
<!-- Top Navigation Bar -->
<!-- Derived from JSON: TopAppBar configuration -->
<header class="fixed top-0 left-0 right-0 h-16 bg-surface dark:bg-surface-container border-b border-outline-variant z-50 flex justify-between items-center px-margin-mobile">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:bg-surface-container-low dark:hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-150" onclick="window.history.back()">

<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed">Raise a Complaint</h1>
</div>

<main class="pt-20 pb-24 px-margin-mobile max-w-xl mx-auto">

<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">How can we help you?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Describe the issue in detail so our maintenance team can resolve it quickly.</p>
</section>
<!-- Form Card -->
<div class="bg-surface-container-lowest custom-card rounded-xl p-md space-y-lg">
<!-- Category Selection -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="category">Complaint Category</label>
<div class="relative">
<select class="w-full h-12 px-md bg-transparent border-[0.5px] border-outline-variant rounded-xl appearance-none focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md text-on-surface outline-none transition-all" id="category">
<option disabled="" selected="" value="">Select category</option>
<option value="plumbing">Plumbing</option>
<option value="electrical">Electrical</option>
<option value="carpentry">Carpentry</option>
<option value="cleaning">Cleaning</option>
<option value="security">Security</option>
<option value="other">Other</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Title Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="title">Short Title</label>
<input class="w-full h-12 px-md bg-transparent border-[0.5px] border-outline-variant rounded-xl focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md text-on-surface outline-none transition-all" id="title" placeholder="e.g. Leaking tap in master bathroom" type="text"/>
</div>
<!-- Description Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="description">Description</label>
<textarea class="w-full p-md bg-transparent border-[0.5px] border-outline-variant rounded-xl focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md text-on-surface outline-none transition-all resize-none" id="description" placeholder="Provide more details about the issue..." rows="5"></textarea>
</div>
<!-- Media Upload Section -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider">Add Photos (Optional)</label>
<div class="flex gap-4 overflow-x-auto pb-xs">

</div>
</div>

<!-- Bottom Navigation Bar (Contextual Check: Not rendered as this is a task-focused sub-page) -->
<!-- The prompt implies a "Back button", suggesting this is a focused task. Navigation is suppressed per "Task-Focused" rule. -->
<script>
        // Micro-interactions for form feedback
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('focused');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('focused');
            });
        });

        // Simple button click effect
        const submitBtn = document.querySelector('button.bg-primary-container');
        submitBtn.addEventListener('click', function() {
            const originalContent = this.innerHTML;
            this.innerHTML = `<span class="animate-spin material-symbols-outlined" data-icon="sync">sync</span> Sending...`;
            this.disabled = true;
            this.style.opacity = '0.7';
            
            setTimeout(() => {
                this.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Submitted!`;
                this.classList.remove('bg-primary-container');
                this.classList.add('bg-tertiary-container');
                this.style.opacity = '1';
                
                // Optional: Redirect or reset
                setTimeout(() => {
                   // window.history.back();
                }, 1500);
            }, 1200);
        });
    </script>
